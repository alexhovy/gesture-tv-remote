<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$page_title</title>
  <link rel="stylesheet" href="/static/remote.css">
</head>
<body>
  <main class="remote-shell">
    <header class="topbar">
      <h1>$heading</h1>
      <nav aria-label="App">
        <a href="/gesture">Gesture</a>
        <a href="/settings">Settings</a>
      </nav>
      <div class="status" id="status">Ready</div>
    </header>
    <section class="remote-pad" aria-label="TV remote">
      <button type="button" data-command="HOME">Home</button>
      <button type="button" data-command="DPAD_UP">Up</button>
      <button type="button" data-command="BACK">Back</button>
      <button type="button" data-command="DPAD_LEFT">Left</button>
      <button class="select" type="button" data-command="DPAD_CENTER">Select</button>
      <button type="button" data-command="DPAD_RIGHT">Right</button>
      <span></span>
      <button type="button" data-command="DPAD_DOWN">Down</button>
      <span></span>
      <button type="button" data-command="VOLUME_DOWN">Vol -</button>
      <span></span>
      <button type="button" data-command="VOLUME_UP">Vol +</button>
    </section>
  </main>
  <script src="/static/remote.js?v=$remote_cache_buster"></script>
</body>
</html>
