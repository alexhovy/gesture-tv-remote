<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$page_title</title>
  <link rel="stylesheet" href="/static/control.css">
</head>
<body>
  <main class="control-shell">
    <header class="topbar">
      <h1>$heading</h1>
      <div class="status" id="status">Disconnected</div>
    </header>
    <section class="stage">
      <video id="preview" autoplay muted playsinline></video>
      <canvas id="overlay" aria-hidden="true"></canvas>
      <div class="empty" id="empty">Camera preview appears after connecting.</div>
    </section>
    <footer class="toolbar">
      <button id="connect" type="button">Connect</button>
      <button id="disconnect" type="button" disabled>Disconnect</button>
      <span id="detail">Camera and microphone stay in the browser and stream to the backend.</span>
    </footer>
  </main>
  <script src="/static/control.js"></script>
</body>
</html>
