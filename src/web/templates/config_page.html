<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>$page_title</title>
  <link rel="stylesheet" href="/static/config.css">
</head>
<body>
  <main>
    <header>
      <div>
        <h1>$heading</h1>
        <p class="intro">
          Saved settings are stored locally. Environment variables override saved
          values; fields marked "Requires restart" take effect after restarting
          the gesture runtime.
        </p>
      </div>
    </header>
    $status
    <form method="post" action="/settings">
      $sections
      <div class="actions">
        <button class="primary" type="submit">Save</button>
        <button class="danger" type="submit" formaction="/reset">Reset</button>
      </div>
    </form>
  </main>
</body>
</html>
