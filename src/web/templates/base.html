<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <link rel="stylesheet" href="/static/app.css">
  {% block head %}{% endblock %}
</head>
<body class="{{ body_class }}">
  <div class="app-shell">
    <header class="app-topbar">
      <a class="brand" href="/">{{ app_name }}</a>
      <nav class="app-nav" aria-label="App">
        <a class="nav-link{% if active_page == 'home' %} active{% endif %}" href="/">Home</a>
        <a class="nav-link{% if active_page == 'gesture' %} active{% endif %}" href="/gesture">Gesture</a>
        <a class="nav-link{% if active_page == 'remote' %} active{% endif %}" href="/remote">Remote</a>
        <a class="nav-link{% if active_page == 'settings' %} active{% endif %}" href="/settings">Settings</a>
      </nav>
      {% block status %}{% endblock %}
    </header>
    <main class="app-main">
      {% block content %}{% endblock %}
    </main>
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
